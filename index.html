<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊鎌倉·湘南之旅</title>

<style>
body{margin:0;font-family:-apple-system;background:#f2f5f9;color:#333;}
.section{display:none;padding-bottom:80px;}
.section.active{display:block;}

.hero{
background:linear-gradient(135deg,#4facfe,#00c6ff);
color:white;
padding:30px 20px;
font-size:22px;
font-weight:bold;
}

.day-tabs{display:flex;gap:8px;padding:10px;}
.day-tabs button{
flex:1;padding:8px;border:none;border-radius:10px;background:#ddd;
}
.day-tabs button.active{background:#4facfe;color:white;}

.day{display:none;}
.day.active{display:block;}

.spot{
background:white;margin:10px;padding:14px;border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
cursor:pointer;
}
.detail{display:none;margin-top:8px;font-size:13px;color:#555;}

.btn{
display:inline-block;margin-top:6px;
background:#4facfe;color:white;padding:6px 10px;
border-radius:8px;text-decoration:none;font-size:13px;
}

.nav{
position:fixed;bottom:0;width:100%;display:flex;
background:white;border-top:1px solid #ddd;
}
.nav button{
flex:1;border:none;background:none;padding:8px;font-size:12px;
}
.nav button.active{color:#4facfe;font-weight:bold;}
</style>
</head>

<body>

<div class="hero">🌊鎌倉·湘南之旅</div>

<!-- 行程 -->
<div id="trip" class="section active">

<div class="day-tabs">
<button onclick="showDay(1,this)" class="active">Day1</button>
<button onclick="showDay(2,this)">Day2</button>
<button onclick="showDay(3,this)">Day3</button>
</div>

<!-- Day1 -->
<div id="day1" class="day active">

<div class="spot" onclick="toggle(this)">
<h3>15:00 和美屋 Check-in</h3>
<div class="detail">鎌倉→長谷（江之電）</div>
</div>

<div class="spot" onclick="toggle(this)">
<h3>16:30 七里濱夕陽</h3>
<div class="detail">
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=七里ヶ浜">導航</a>
</div>
</div>

<div class="spot" onclick="toggle(this)">
<h3>18:30 晚餐</h3>
</div>

</div>

<!-- Day2 -->
<div id="day2" class="day">

<div class="spot" onclick="toggle(this)">
<h3>bills 七里ヶ浜</h3>
<div class="detail">
07:00–21:00<br>
地址：Weekend House Alley 2F<br>
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=bills 七里ヶ浜">導航</a>
</div>
</div>

<div class="spot" onclick="toggle(this)">
<h3>鎌倉高校前</h3>
<div class="detail">
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=鎌倉高校前駅">導航</a>
</div>
</div>

<div class="spot" onclick="toggle(this)">
<h3>長谷大佛</h3>
<div class="detail">
08:00–16:45<br>
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=高徳院">導航</a>
</div>
</div>

</div>

<!-- Day3 -->
<div id="day3" class="day">

<div class="spot" onclick="toggle(this)">
<h3>09:30 Check-out</h3>
</div>

<div class="spot" onclick="toggle(this)">
<h3>佐助稻荷神社</h3>
<div class="detail">
09:00–17:00<br>
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=佐助稲荷神社">導航</a>
</div>
</div>

<div class="spot" onclick="toggle(this)">
<h3>鶴岡八幡宮</h3>
<div class="detail">
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=鶴岡八幡宮">導航</a>
</div>
</div>

</div>

</div>

<!-- 金流 -->
<div id="money" class="section">
<div class="spot">
<h3>💰 金流管理</h3>
<input placeholder="Day1 花費"><br>
<input placeholder="Day2 花費"><br>
<input placeholder="Day3 花費"><br>
</div>
</div>

<!-- 天氣 -->
<div id="weather" class="section">
<div class="spot">
<h3>🌤 鎌倉天氣</h3>
<p id="weatherText"></p>
<p id="sunText"></p>
</div>
</div>

<!-- 底部 -->
<div class="nav">
<button onclick="tab('trip',this)" class="active">🗓</button>
<button onclick="tab('money',this)">💰</button>
<button onclick="tab('weather',this)">🌤</button>
</div>

<script>
function tab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

function showDay(n,el){
document.querySelectorAll('.day').forEach(d=>d.classList.remove('active'));
document.getElementById('day'+n).classList.add('active');
document.querySelectorAll('.day-tabs button').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

function toggle(el){
let d=el.querySelector('.detail');
if(d) d.style.display=d.style.display==='block'?'none':'block';
}

// 天氣+日出
fetch("https://api.open-meteo.com/v1/forecast?latitude=35.31&longitude=139.55&daily=sunrise,sunset&current_weather=true&timezone=Asia%2FTokyo")
.then(r=>r.json()).then(d=>{
weatherText.innerText="溫度："+d.current_weather.temperature+"°C";
sunText.innerText="日出："+d.daily.sunrise[0].split('T')[1]+" 日落："+d.daily.sunset[0].split('T')[1];
});
</script>

</body>
</html>
