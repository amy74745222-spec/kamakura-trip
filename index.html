<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鎌倉旅遊App</title>

<style>
body{margin:0;font-family:-apple-system;background:#f5f7fa;}
header{padding:20px;font-size:20px;font-weight:bold;}
.section{display:none;padding:16px;}
.section.active{display:block;}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd;}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:white;border-top:1px solid #ddd;}
.nav button{flex:1;border:none;padding:12px;background:none;}
.nav button.active{color:#3498db;font-weight:bold;}
.btn{display:inline-block;padding:8px 12px;background:#3498db;color:white;border-radius:10px;text-decoration:none;margin-top:5px;}
</style>
</head>

<body>

<header>🌊 鎌倉旅遊App</header>

<!-- 行程 -->
<div <!-- Hero 圖 -->
<div style="position:relative;">
  <img src="你的圖片連結" style="width:100%;height:220px;object-fit:cover;">
  <div style="position:absolute;bottom:10px;left:15px;color:white;font-size:20px;font-weight:bold;">
    鎌倉・湘南之旅
  </div>
</div>

<!-- Day 切換 -->
<div style="display:flex;gap:10px;padding:10px;">
  <button onclick="showDay(1)">Day1</button>
  <button onclick="showDay(2)">Day2</button>
  <button onclick="showDay(3)">Day3</button>
</div>

<!-- 行程容器 -->
<div id="day1" class="day active">
  <div class="spot" onclick="toggle(this)">
    <h3>七里濱夕陽</h3>
    <div class="detail">
      <p>地址：七里ヶ浜海岸</p>
      <p>時間：全天開放</p>
      <a href="https://www.google.com/maps/search/?api=1&query=七里ヶ浜" target="_blank">導航</a>
    </div>
  </div>
</div>

<div id="day2" class="day">
  <div class="spot" onclick="toggle(this)">
    <h3>鎌倉高校前</h3>
    <div class="detail">
      <p>地址：神奈川県鎌倉市腰越</p>
      <p>時間：全天</p>
      <a href="https://www.google.com/maps/search/?api=1&query=鎌倉高校前駅" target="_blank">導航</a>
    </div>
  </div>
</div>

<div id="day3" class="day">
  <div class="spot" onclick="toggle(this)">
    <h3>鶴岡八幡宮</h3>
    <div class="detail">
      <p>地址：神奈川県鎌倉市雪ノ下2-1-31</p>
      <p>時間：06:00–20:00</p>
      <a href="https://www.google.com/maps/search/?api=1&query=鶴岡八幡宮" target="_blank">導航</a>
    </div>
  </div>
</div>

<!-- 匯率 -->
<div id="fx" class="section">
<div class="card">
<h3>💱 匯率換算</h3>
<input id="twd" placeholder="台幣">
<input id="jpy" placeholder="日幣">
<p id="rateText">載入中...</p>
</div>
</div>

<!-- 預算 -->
<div id="budget" class="section">
<div class="card">
<h3>💰 預算分析</h3>
<input id="cost1" placeholder="Day1 花費">
<input id="cost2" placeholder="Day2 花費">
<input id="cost3" placeholder="Day3 花費">
<p id="total">總計：0</p>
</div>
</div>

<!-- 天氣 -->
<div id="weather" class="section">
<div class="card">
<h3>🌤 鎌倉天氣</h3>
<p id="weatherText">載入中...</p>
<p id="sunText"></p>
</div>
</div>

<!-- 底部 -->
<div class="nav">
<button onclick="tab('trip')" class="active">行程</button>
<button onclick="tab('fx')">匯率</button>
<button onclick="tab('budget')">預算</button>
<button onclick="tab('weather')">天氣</button>
</div>

<script>
// 切換
function tab(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
}

// 匯率
let rate=0.21;
fetch("https://api.exchangerate.host/latest?base=JPY&symbols=TWD")
.then(r=>r.json()).then(d=>{
rate=d.rates.TWD;
document.getElementById("rateText").innerText="1JPY ≈ "+rate.toFixed(3)+" TWD";
});
twd.oninput=()=>jpy.value=(twd.value/rate).toFixed(0);
jpy.oninput=()=>twd.value=(jpy.value*rate).toFixed(0);

// 預算
function calc(){
let total=(+cost1.value||0)+(+cost2.value||0)+(+cost3.value||0);
document.getElementById("total").innerText="總計："+total;
}
cost1.oninput=cost2.oninput=cost3.oninput=calc;

// 天氣（簡化版）
fetch("https://api.open-meteo.com/v1/forecast?latitude=35.31&longitude=139.55&current_weather=true")
.then(r=>r.json()).then(d=>{
document.getElementById("weatherText").innerText="溫度："+d.current_weather.temperature+"°C";
document.getElementById("sunText").innerText="日出約 05:50 / 日落約 17:00";
});
</script>

</body>
</html>
